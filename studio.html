<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#050505">
  <title>スタジオ日程調整 | NO KIDDING</title>
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="studio.css?v=7.5.1">
</head>
<body>
  <main class="studio-screen">
    <img src="studio-page.png" alt="スタジオ日程調整">

    <a class="tap back" href="index.html" aria-label="トップページへ戻る"></a>
    <button class="tap add-top" type="button" aria-label="候補日を追加"></button>

    <select class="member-select" aria-label="回答するメンバー">
      <option>YAMA</option>
      <option>殿</option>
      <option>うっちー</option>
      <option>RYUTO</option>
      <option>じゅん</option>
      <option>マスター</option>
    </select>
    <span class="member-select-wrap-arrow" aria-hidden="true"></span>

    <div class="member-chips" aria-label="メンバー選択">
      <button data-member="YAMA">YAMA</button>
      <button data-member="殿">殿</button>
      <button data-member="うっちー">うっちー</button>
      <button data-member="RYUTO">RYUTO</button>
      <button data-member="じゅん">じゅん</button>
      <button data-member="マスター">マスター</button>
    </div>

    <div class="answer-grid" aria-label="候補日への回答">
      <div class="answer-row" data-date="7/1"><button data-answer="yes" aria-label="7月1日 参加できる"></button><button data-answer="maybe" aria-label="7月1日 未定"></button><button data-answer="no" aria-label="7月1日 参加できない"></button></div>
      <div class="answer-row" data-date="7/2"><button data-answer="yes" aria-label="7月2日 参加できる"></button><button data-answer="maybe" aria-label="7月2日 未定"></button><button data-answer="no" aria-label="7月2日 参加できない"></button></div>
      <div class="answer-row" data-date="7/3"><button data-answer="yes" aria-label="7月3日 参加できる"></button><button data-answer="maybe" aria-label="7月3日 未定"></button><button data-answer="no" aria-label="7月3日 参加できない"></button></div>
      <div class="answer-row" data-date="7/4"><button data-answer="yes" aria-label="7月4日 参加できる"></button><button data-answer="maybe" aria-label="7月4日 未定"></button><button data-answer="no" aria-label="7月4日 参加できない"></button></div>
      <div class="answer-row" data-date="7/5"><button data-answer="yes" aria-label="7月5日 参加できる"></button><button data-answer="maybe" aria-label="7月5日 未定"></button><button data-answer="no" aria-label="7月5日 参加できない"></button></div>
      <div class="answer-row" data-date="7/6"><button data-answer="yes" aria-label="7月6日 参加できる"></button><button data-answer="maybe" aria-label="7月6日 未定"></button><button data-answer="no" aria-label="7月6日 参加できない"></button></div>
      <div class="answer-row" data-date="7/7"><button data-answer="yes" aria-label="7月7日 参加できる"></button><button data-answer="maybe" aria-label="7月7日 未定"></button><button data-answer="no" aria-label="7月7日 参加できない"></button></div>
      <div class="answer-row" data-date="7/8"><button data-answer="yes" aria-label="7月8日 参加できる"></button><button data-answer="maybe" aria-label="7月8日 未定"></button><button data-answer="no" aria-label="7月8日 参加できない"></button></div>
    </div>

    <button class="tap save" type="button" aria-label="回答を保存する"></button>
    <button class="tap add-bottom" type="button" aria-label="候補日を追加"></button>
  </main>

  <section class="answer-editor" hidden aria-hidden="true" aria-label="メンバーの日程回答">
    <div class="editor-panel">
      <header class="editor-header">
        <button class="editor-back" type="button" aria-label="集計画面へ戻る">‹</button>
        <div>
          <img src="logo.png" alt="">
          <h2>日程回答</h2>
          <p class="editor-member">YAMA</p>
        </div>
        <button class="editor-close" type="button" aria-label="閉じる">×</button>
      </header>
      <div class="editor-legend" aria-hidden="true">
        <span class="yes">○ 参加できる</span>
        <span class="maybe">△ 未定</span>
        <span class="no">× 参加できない</span>
      </div>
      <div class="editor-dates"></div>
      <button class="editor-save" type="button">回答を保存する</button>
    </div>
  </section>

  <div class="toast" role="status" aria-live="polite"></div>
  <script src="studio-answer-v751.js"></script>
</body>
</html>
