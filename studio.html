<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="description" content="NO KIDDING スタジオ日程調整">
  <title>スタジオ日程調整 | NO KIDDING</title>
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="studio.css?v=8.0.0">
</head>
<body>
  <main class="studio-app">
    <header class="page-header">
      <a class="header-button" href="index.html" aria-label="トップページへ戻る">‹</a>
      <h1>スタジオ日程調整</h1>
      <button class="header-button add-candidate" type="button" aria-label="候補月を追加">＋</button>
    </header>

    <section class="summary-view" aria-labelledby="summary-title">
      <h2 id="summary-title"><span class="month-number">7</span>月スタジオ予定</h2>

      <div class="selectors">
        <label class="sr-only" for="summary-month">表示する月</label>
        <input id="summary-month" class="select-control" type="month" aria-label="表示する月">

        <label class="section-label" for="member-select">回答するメンバー</label>
        <select id="member-select" class="select-control" aria-label="回答するメンバー"></select>
      </div>

      <div class="member-tabs" aria-label="メンバー選択"></div>

      <div class="summary-heading">
        <strong>回答 6人</strong>
        <div class="legend" aria-label="回答記号">
          <span class="yes"><b>○</b>参加できる</span>
          <span class="maybe"><b>△</b>未定</span>
          <span class="no"><b>×</b>参加できない</span>
        </div>
      </div>

      <div class="summary-list" aria-live="polite"></div>

      <button class="primary-button save-summary" type="button">回答を保存する</button>
      <button class="secondary-button add-candidate" type="button">＋ 候補日を追加</button>
    </section>
  </main>

  <section class="answer-view" hidden aria-hidden="true">
    <div class="answer-panel">
      <header class="answer-header">
        <button class="header-button answer-back" type="button" aria-label="集計画面へ戻る">‹</button>
        <div class="answer-heading">
          <h2>日程回答</h2>
          <p class="answer-member"></p>
        </div>
        <button class="header-button answer-close" type="button" aria-label="集計画面へ戻る">×</button>
      </header>

      <div class="answer-legend legend" aria-label="回答記号">
        <span class="yes"><b>○</b>参加できる</span>
        <span class="maybe"><b>△</b>未定</span>
        <span class="no"><b>×</b>参加できない</span>
      </div>

      <div class="answer-list"></div>
      <button class="primary-button save-answer" type="button">回答を保存する</button>
    </div>
  </section>

  <section class="candidate-dialog" hidden aria-hidden="true" aria-labelledby="candidate-title">
    <div class="candidate-card">
      <button class="dialog-close" type="button" aria-label="閉じる">×</button>
      <p>NEW STUDIO MONTH</p>
      <h2 id="candidate-title">候補月を追加</h2>
      <label for="candidate-month">追加する月</label>
      <input id="candidate-month" type="month">
      <div class="dialog-actions">
        <button class="cancel-candidate" type="button">キャンセル</button>
        <button class="confirm-candidate" type="button">この月を追加</button>
      </div>
    </div>
  </section>

  <div class="toast" role="status" aria-live="polite"></div>
  <script src="studio.js?v=8.0.0"></script>
</body>
</html>
