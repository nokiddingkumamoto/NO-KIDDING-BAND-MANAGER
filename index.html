<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#050505">
<title>NO KIDDING BAND MANAGER</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header class="topbar"><button class="icon-btn" id="menuBtn">☰</button><img src="assets/logo.png" alt="NO KIDDING" class="logo"><button class="icon-btn" id="installBtn">＋</button></header>
<main>
<section class="page active" id="home">
<article class="hero"><div class="hero-copy"><span class="sticker" id="nextType">NEXT EVENT</span><h1 id="nextTitle">予定を登録してください</h1><p id="nextMeta">スケジュール画面の「＋」から追加できます。</p><strong id="countdown">LET'S GO!</strong></div><img src="assets/character.png" alt="" class="character"></article>
<div class="menu-grid"><button data-page="schedule" class="cyan"><b>📅</b><span>スケジュール</span></button><button data-page="attendance" class="pink"><b>✓</b><span>出欠確認</span></button><button data-page="merch" class="yellow"><b>👕</b><span>物販・在庫</span></button><button data-page="finance" class="cyan"><b>¥</b><span>会計・売上</span></button></div>
<section class="status-card"><h2>QUICK STATUS</h2><div class="stats"><div><strong id="scheduleCount">0</strong><span>予定</span></div><div><strong id="liveCount">0</strong><span>ライブ</span></div><div><strong id="studioCount">0</strong><span>スタジオ</span></div></div></section>
</section>
<section class="page" id="schedule"><div class="section-head"><button data-page="home">‹</button><h2>スケジュール</h2><button id="addSchedule">＋</button></div><div class="filters"><button class="active" data-filter="all">すべて</button><button data-filter="live">ライブ</button><button data-filter="studio">スタジオ</button><button data-filter="meeting">ミーティング</button><button data-filter="recording">レコーディング</button><button data-filter="other">その他</button></div><div id="scheduleList" class="list"></div></section>
<section class="page" id="attendance"><div class="section-head"><button data-page="home">‹</button><h2>出欠確認</h2><span></span></div><article class="panel"><p>出欠機能は次の更新で拡張します。</p></article></section>
<section class="page" id="merch"><div class="section-head"><button data-page="home">‹</button><h2>物販・在庫</h2><span></span></div><article class="panel"><p>物販機能は次の更新で拡張します。</p></article></section>
<section class="page" id="finance"><div class="section-head"><button data-page="home">‹</button><h2>会計・売上</h2><span></span></div><article class="panel"><p>会計機能は次の更新で拡張します。</p></article></section>
</main>
<nav class="bottom-nav"><button data-page="home" class="active">⌂<span>ホーム</span></button><button data-page="schedule">📅<span>予定</span></button><button data-page="attendance">✓<span>出欠</span></button><button data-page="merch">👕<span>物販</span></button><button data-page="finance">¥<span>会計</span></button></nav>
<dialog id="scheduleDialog"><form id="scheduleForm" method="dialog"><h3 id="dialogTitle">予定を追加</h3><input type="hidden" id="scheduleId"><label>分類<select id="scheduleType" required><option value="live">ライブ</option><option value="studio">スタジオ</option><option value="meeting">ミーティング</option><option value="recording">レコーディング</option><option value="other">その他</option></select></label><label>タイトル<input id="scheduleTitle" required placeholder="例：熊本 Be-9 ライブ"></label><label>日付<input id="scheduleDate" type="date" required></label><label>時間<input id="scheduleTime" type="time"></label><label>会場・場所<input id="schedulePlace" placeholder="例：KUMAMOTO Be-9"></label><label>ノルマ<input id="scheduleQuota" type="number" min="0" step="1" placeholder="例：20000"></label><label>メモ<textarea id="scheduleMemo" rows="4" placeholder="集合時間、持ち物など"></textarea></label><div class="dialog-actions"><button type="button" id="cancelSchedule" class="ghost-btn">キャンセル</button><button type="submit" class="punk-btn">保存</button></div></form></dialog>
<script src="app.js"></script>
</body></html>
