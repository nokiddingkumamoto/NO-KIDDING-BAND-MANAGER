<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#050505">
  <title>NO KIDDING BAND MANAGER Ver.1.8</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css?v=180">
</head>
<body>

<div class="menu-overlay" id="menuOverlay" hidden></div>
<aside class="side-menu" id="sideMenu" aria-hidden="true">
  <div class="side-menu-head">
    <img src="assets/logo.png" alt="NO KIDDING">
    <button type="button" id="closeMenuBtn" aria-label="メニューを閉じる">×</button>
  </div>

  <nav class="side-menu-nav">
    <button data-menu-page="home"><span>⌂</span><b>ホーム</b></button>
    <button data-menu-page="schedule"><span>📅</span><b>確定スケジュール</b></button>
    <button data-menu-page="studioPolls"><span>✓</span><b>スタジオ日程調整</b></button>
    <button data-menu-page="merch"><span>👕</span><b>物販・在庫</b></button>
    <button data-menu-page="finance"><span>¥</span><b>会計・売上</b></button>
  </nav>

  <div class="side-menu-info">
    <strong>NO KIDDING BAND MANAGER</strong>
    <span>Ver.1.8</span>
  </div>
</aside>

<header class="topbar">
  <button type="button" class="icon-btn" id="menuBtn" aria-label="メニューを開く" aria-expanded="false">☰</button>
  <div class="brand-stack"><img src="assets/logo.png" alt="NO KIDDING" class="logo"><div class="brand-subtitle">バンドマネージャー</div></div>
  <button type="button" class="icon-btn" id="quickAddBtn" aria-label="スケジュールを追加">＋</button>
</header>

<main>
  <section class="page active" id="home">
    <div class="home-title-row first-home-heading">
      <h2>スケジュール</h2>
      <button data-page="schedule">すべて見る ›</button>
    </div>

    <div id="homeUpcomingList" class="home-schedule-list"></div>

    <button type="button" id="homeAddSchedule" class="home-add-schedule">📅 スケジュールを追加する</button>

    <div class="home-title-row quick-heading">
      <h2>クイックメニュー</h2>
    </div>

    <div class="home-quick-grid">
      <button data-page="schedule" class="home-quick-card cyan">
        <b>📅</b><span>確定スケジュール</span>
      </button>
      <button data-page="studioPolls" class="home-quick-card pink">
        <b>✓</b><span>スタジオ日程調整</span>
      </button>
      <button data-page="merch" class="home-quick-card yellow">
        <b>👕</b><span>物販・在庫</span>
      </button>
      <button data-page="finance" class="home-quick-card lime">
        <b>¥</b><span>会計・売上</span>
      </button>
    </div>
  </section>

  <section class="page" id="schedule">
    <div class="section-head">
      <button data-back data-fallback="home">‹</button>
      <h2>確定スケジュール</h2>
      <button id="addSchedule">＋</button>
    </div>
    <div class="filters">
      <button class="active" data-filter="all">すべて</button>
      <button data-filter="live">ライブ</button>
      <button data-filter="studio">スタジオ</button>
      <button data-filter="meeting">ミーティング</button>
      <button data-filter="recording">レコーディング</button>
      <button data-filter="other">その他</button>
    </div>
    <p class="confirmed-note">ここには、すでに決まった予定だけが表示されます。スタジオ候補日は「スタジオ日程調整」で回答・確定してください。</p>
    <div id="scheduleList" class="list"></div>
  </section>

  <section class="page" id="studioPolls">
    <div class="section-head">
      <button data-back data-fallback="home">‹</button>
      <h2>スタジオ日程調整</h2>
      <button id="addPoll">＋</button>
    </div>
    <div id="pollList" class="list"></div>
  </section>

  <section class="page" id="pollDetail">
    <div class="section-head">
      <button data-back data-fallback="studioPolls">‹</button>
      <h2 id="pollDetailTitle">日程調整</h2>
      <span></span>
    </div>

    <article class="panel poll-summary">
      <p id="pollDetailMonth"></p>
      <label>回答するメンバー
        <select id="answerMember"></select>
      </label>
    </article>

    <div id="pollAnswerRows" class="answer-list"></div>

    <div class="sticky-actions">
      <button id="saveAnswers" class="punk-btn">この回答を保存</button>
      <button id="openResults" class="ghost-btn">集計結果を見る</button>
    </div>
  </section>

  <section class="page" id="pollResults">
    <div class="section-head">
      <button data-back data-fallback="pollDetail">‹</button>
      <h2>集計結果</h2>
      <span></span>
    </div>
    <article class="panel multi-date-panel">
      <h3>確定する日を複数選択</h3>
      <p>候補日の「選択」を押し、最後にまとめて確定してください。</p>
      <div class="multi-date-actions">
        <button type="button" id="clearSelectedDates" class="ghost-btn">選択解除</button>
        <button type="button" id="finalizeSelectedDates" class="punk-btn">選択した日を確定</button>
      </div>
    </article>
    <div id="resultRows" class="result-list"></div>
  </section>

  <section class="page" id="merch">
    <div class="section-head"><button data-back data-fallback="home">‹</button><h2>物販・在庫</h2><span></span></div>
    <article class="panel">物販機能は次の更新で追加します。</article>
  </section>

  <section class="page" id="finance">
    <div class="section-head"><button data-back data-fallback="home">‹</button><h2>会計・売上</h2><span></span></div>
    <article class="panel">会計機能は次の更新で追加します。</article>
  </section>


</main>


<dialog id="scheduleDialog">
  <form id="scheduleForm">
    <h3 id="scheduleDialogTitle">確定予定を追加</h3>
    <input type="hidden" id="scheduleId">
    <label>分類
      <select id="scheduleType" required>
        <option value="live">ライブ</option>
        <option value="studio">スタジオ</option>
        <option value="meeting">ミーティング</option>
        <option value="recording">レコーディング</option>
        <option value="other">その他</option>
      </select>
    </label>
    <label>タイトル<input id="scheduleTitle" required></label>
    <label>日付<input id="scheduleDate" type="date" required></label>
    <label>時間<input id="scheduleTime" type="time"></label>
    <label>会場・場所<input id="schedulePlace"></label>
    <label>ノルマ<input id="scheduleQuota" type="number" min="0"></label>
    <label>メモ<textarea id="scheduleMemo" rows="4"></textarea></label>
    <label>イベント画像
      <input id="scheduleImageInput" type="file" accept="image/*">
    </label>
    <div class="event-image-preview-wrap">
      <img id="scheduleImagePreview" alt="イベント画像プレビュー">
      <button type="button" id="removeScheduleImage" class="ghost-btn">画像を削除</button>
    </div>
    
    <div class="dialog-actions">
      <button type="button" class="ghost-btn" data-close="scheduleDialog">キャンセル</button>
      <button type="submit" class="punk-btn">保存</button>
    </div>
  </form>
</dialog>

<dialog id="pollDialog">
  <form id="pollForm">
    <h3 id="pollDialogTitle">スタジオ日程調整を作成</h3>
    <input type="hidden" id="pollEditId">
    <label>対象月<input id="pollMonth" type="month" required></label>
    <label>タイトル<input id="pollTitle" required placeholder="例：8月スタジオ日程調整"></label>
    <label>開始時間<input id="pollStartTime" type="time" value="20:00"></label>
    <label>終了時間<input id="pollEndTime" type="time" value="23:00"></label>
    <label>場所<input id="pollPlace" placeholder="例：熊本市内スタジオ"></label>
    <label>候補に含める曜日</label>
    <div class="weekday-grid" id="weekdayOptions">
      <label><input type="checkbox" value="0" checked>日</label>
      <label><input type="checkbox" value="1" checked>月</label>
      <label><input type="checkbox" value="2" checked>火</label>
      <label><input type="checkbox" value="3" checked>水</label>
      <label><input type="checkbox" value="4" checked>木</label>
      <label><input type="checkbox" value="5" checked>金</label>
      <label><input type="checkbox" value="6" checked>土</label>
    </div>
    <div class="dialog-actions">
      <button type="button" class="ghost-btn" data-close="pollDialog">キャンセル</button>
      <button type="submit" class="punk-btn">作成</button>
    </div>
  </form>
</dialog>


<script>
(function () {
  "use strict";

  var menuButton = document.getElementById("menuBtn");
  var closeButton = document.getElementById("closeMenuBtn");
  var overlay = document.getElementById("menuOverlay");
  var drawer = document.getElementById("sideMenu");

  if (!menuButton || !closeButton || !overlay || !drawer) return;

  var opened = false;

  function openDrawer() {
    opened = true;
    overlay.hidden = false;
    drawer.classList.add("open");
    drawer.setAttribute("aria-hidden", "false");
    menuButton.setAttribute("aria-expanded", "true");
    document.body.classList.add("menu-open");

    if (!history.state || !history.state.sideMenu) {
      history.pushState({ sideMenu: true }, "", location.href);
    }
  }

  function closeDrawer(changeHistory) {
    if (!opened) return;

    opened = false;
    overlay.hidden = true;
    drawer.classList.remove("open");
    drawer.setAttribute("aria-hidden", "true");
    menuButton.setAttribute("aria-expanded", "false");
    document.body.classList.remove("menu-open");

    if (changeHistory && history.state && history.state.sideMenu) {
      history.back();
    }
  }

  menuButton.addEventListener("click", function (event) {
    event.preventDefault();
    event.stopPropagation();
    if (opened) closeDrawer(true);
    else openDrawer();
  });

  closeButton.addEventListener("click", function () {
    closeDrawer(true);
  });

  overlay.addEventListener("click", function () {
    closeDrawer(true);
  });

  drawer.querySelectorAll("[data-menu-page]").forEach(function (button) {
    button.addEventListener("click", function () {
      var target = button.getAttribute("data-menu-page");
      closeDrawer(false);

      var page = document.getElementById(target);
      if (page) {
        document.querySelectorAll(".page").forEach(function (item) {
          item.classList.toggle("active", item.id === target);
        });
        document.querySelectorAll(".bottom-nav button").forEach(function (item) {
          item.classList.toggle("active", item.getAttribute("data-page") === target);
        });
        window.scrollTo(0, 0);
      }
    });
  });

  window.addEventListener("popstate", function () {
    if (opened) closeDrawer(false);
  });

  window.NKSideMenu = {
    open: openDrawer,
    close: closeDrawer,
    isOpen: function () { return opened; }
  };
})();
</script>

<script src="app.js?v=180"></script>
</body>
</html>
