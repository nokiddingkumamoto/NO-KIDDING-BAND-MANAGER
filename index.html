<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#050505">
  <meta name="description" content="NO KIDDING BAND MANAGER">
  <title>NO KIDDING BAND MANAGER</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="pixel.css?v=7.3.3">
</head>
<body>
  <main class="visual-page" id="top">
    <img src="assets/top-page.png" alt="NO KIDDING BAND MANAGER トップページ">
    <button class="hotspot menu-button" type="button" aria-label="メニューを開く" aria-expanded="false"></button>
    <button class="hotspot add-button" type="button" aria-label="追加メニューを開く" aria-expanded="false"></button>
    <button class="hotspot schedule-card schedule-one" type="button" aria-label="7月20日 スタジオ練習"></button>
    <button class="hotspot schedule-card schedule-two" type="button" aria-label="9月22日 九州スカフェス"></button>
    <button class="hotspot schedule-card schedule-three" type="button" aria-label="10月11日 福岡CBライブ"></button>
    <button class="hotspot quick-card quick-schedule" type="button" data-target="schedule" aria-label="確定スケジュール"></button>
    <button class="hotspot quick-card quick-studio" type="button" data-target="studio" aria-label="スタジオ日程調整"></button>
    <button class="hotspot quick-card quick-merch" type="button" data-target="merch" aria-label="物販・在庫"></button>
  </main>

  <div class="sheet-backdrop" hidden></div>
  <nav class="side-sheet" aria-label="メニュー" aria-hidden="true">
    <button class="sheet-close" type="button" aria-label="閉じる">×</button>
    <img src="assets/logo.png" alt="">
    <a href="#top">ホーム</a>
    <a href="#schedule">確定スケジュール</a>
    <a href="#studio">スタジオ日程調整</a>
    <a href="#merch">物販・在庫</a>
  </nav>
  <div class="add-popover" hidden>
    <p>QUICK ADD</p>
    <button type="button">＋ スケジュール</button>
    <button type="button">＋ 商品</button>
    <button type="button">＋ 在庫数</button>
  </div>
  <div class="toast" role="status" aria-live="polite"></div>
  <script src="app.js?v=7.3.3"></script>
</body>
</html>
