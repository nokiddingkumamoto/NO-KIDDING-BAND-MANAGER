<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="description" content="NO KIDDING BAND MANAGER">
  <title>NO KIDDING BAND MANAGER</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css?v=600">
</head>
<body>
  <div id="overlay" class="overlay" hidden></div>

  <aside id="drawer" class="drawer" aria-hidden="true">
    <div class="drawer-head">
      <img src="assets/logo.png" alt="NO KIDDING">
      <button id="closeMenu" class="drawer-close" aria-label="閉じる">×</button>
    </div>
    <button data-page="home">ホーム</button>
    <button data-page="schedule">確定スケジュール</button>
    <button data-page="polls">スタジオ日程調整</button>
    <button data-page="merch">物販・在庫</button>
  </aside>

  <header class="hero">
    <button id="menuBtn" class="square-button menu-button" aria-label="メニュー">
      <span></span><span></span><span></span>
    </button>
    <div class="brand">
      <img src="assets/logo.png" alt="NO KIDDING from West Coast Japan">
      <div class="brand-subtitle">バンドマネージャー</div>
    </div>
    <button id="quickAdd" class="square-button plus-button" aria-label="追加">＋</button>
  </header>
  <div class="neon-divider"></div>

  <main>
    <section id="home" class="page active">
      <section class="next-grid" aria-label="次の予定">
        <article class="next-card cyan-card">
          <div class="next-copy">
            <h2>NEXT STUDIO</h2>
            <p>次のスタジオまで</p>
            <strong id="nextStudioDays">3<span>日</span></strong>
          </div>
          <div class="drum-art" aria-hidden="true">
            <span class="drum d1"></span><span class="drum d2"></span><span class="drum d3"></span><span class="drum d4"></span>
            <span class="stand s1"></span><span class="stand s2"></span><span class="stand s3"></span>
          </div>
        </article>
        <article class="next-card pink-card">
          <div class="next-copy">
            <h2>NEXT LIVE</h2>
            <p>次のライブまで</p>
            <strong id="nextLiveDays">62<span>日</span></strong>
          </div>
          <div class="crowd-art" aria-hidden="true">
            <i></i><i></i><i></i><i></i><i></i><i></i><i></i>
          </div>
        </article>
      </section>

      <div class="section-head schedule-head">
        <h2>スケジュール</h2>
        <button data-page="schedule">すべて見る ›</button>
      </div>
      <div id="homeSchedules" class="schedule-stack"></div>

      <div class="section-head quick-head">
        <h2>クイックメニュー</h2>
      </div>
      <div class="quick-grid" aria-label="クイックメニュー">
        <button class="quick-card quick-cyan" data-page="schedule">
          <span class="splatter" aria-hidden="true"></span>
          <span class="calendar-icon" aria-hidden="true"><b>17</b></span>
          <strong>確定スケジュール</strong>
          <span class="round-arrow" aria-hidden="true">›</span>
        </button>
        <button class="quick-card quick-pink" data-page="polls">
          <span class="splatter" aria-hidden="true"></span>
          <span class="check-icon" aria-hidden="true">✓</span>
          <strong>スタジオ日程調整</strong>
          <span class="round-arrow" aria-hidden="true">›</span>
        </button>
        <button class="quick-card quick-yellow" data-page="merch">
          <span class="splatter" aria-hidden="true"></span>
          <span class="shirt-icon" aria-hidden="true"><i>ϟ</i></span>
          <strong>物販・在庫</strong>
          <span class="round-arrow" aria-hidden="true">›</span>
        </button>
      </div>
    </section>

    <section id="schedule" class="page">
      <div class="page-title"><button data-page="home">‹</button><h2>確定スケジュール</h2><button id="addSchedule">＋</button></div>
      <div id="scheduleList" class="schedule-stack"></div>
    </section>

    <section id="polls" class="page">
      <div class="page-title"><button data-page="home">‹</button><h2>スタジオ日程調整</h2><button id="addPoll">＋</button></div>
      <div class="empty-panel"><b>スタジオ日程調整</b><p>次の段階で○・△・×回答機能を追加します。</p></div>
    </section>

    <section id="merch" class="page">
      <div class="page-title"><button data-page="home">‹</button><h2>物販・在庫</h2><button id="addMerch">＋</button></div>
      <div class="summary">
        <div><small>商品数</small><b id="itemCount">0</b></div>
        <div><small>総在庫</small><b id="stockTotal">0</b></div>
        <div><small>在庫金額</small><b id="stockValue">¥0</b></div>
      </div>
      <div id="merchList" class="simple-list"></div>
    </section>
  </main>

  <dialog id="quickAddDialog" class="dialog quick-add-dialog">
    <div class="dialog-card">
      <div class="dialog-title"><h3>追加する項目</h3><button type="button" data-close>×</button></div>
      <button id="quickScheduleAction" class="action-button cyan-action">スケジュールを追加</button>
      <button id="quickProductAction" class="action-button yellow-action">商品を追加</button>
      <button id="quickStockAction" class="action-button pink-action">在庫数を変更</button>
    </div>
  </dialog>

  <dialog id="scheduleDialog" class="dialog">
    <form id="scheduleForm" class="dialog-card">
      <div class="dialog-title"><h3 id="scheduleDialogTitle">スケジュールを追加</h3><button type="button" data-close>×</button></div>
      <label>分類<select id="sType"><option value="studio">スタジオ</option><option value="live">ライブ</option></select></label>
      <label>タイトル<input id="sTitle" required></label>
      <label>日付<input id="sDate" type="date" required></label>
      <label>時間<input id="sTime" placeholder="例：20:00"></label>
      <label>場所<input id="sPlace"></label>
      <div class="dialog-actions"><button id="deleteSchedule" type="button" class="danger" hidden>削除</button><span></span><button type="button" data-close>キャンセル</button><button class="save">保存</button></div>
    </form>
  </dialog>

  <dialog id="merchDialog" class="dialog">
    <form id="merchForm" class="dialog-card">
      <div class="dialog-title"><h3>商品を追加</h3><button type="button" data-close>×</button></div>
      <label>商品名<input id="mName" required></label>
      <label>種類・サイズ<input id="mVariant"></label>
      <label>在庫数<input id="mStock" type="number" min="0" required></label>
      <label>販売価格<input id="mPrice" type="number" min="0" required></label>
      <div class="dialog-actions"><span></span><button type="button" data-close>キャンセル</button><button class="save">保存</button></div>
    </form>
  </dialog>

  <dialog id="stockDialog" class="dialog">
    <form id="stockForm" class="dialog-card">
      <div class="dialog-title"><h3>在庫数を変更</h3><button type="button" data-close>×</button></div>
      <label>商品<select id="stockItem" required></select></label>
      <label>増減数<input id="stockChange" type="number" required placeholder="例：5 または -2"></label>
      <div class="dialog-actions"><span></span><button type="button" data-close>キャンセル</button><button class="save">反映</button></div>
    </form>
  </dialog>

  <script src="app.js?v=600"></script>
</body>
</html>
