<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#050505" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>NO KIDDING BAND MANAGER</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="assets/icon.svg" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="noise"></div>
  <header class="topbar">
    <button class="icon-btn" id="menuBtn" aria-label="メニュー">☰</button>
    <img src="assets/logo.png" class="brand-logo" alt="NO KIDDING" />
    <button class="icon-btn" id="installBtn" aria-label="インストール">＋</button>
  </header>

  <main id="app">
    <section class="page active" data-page="home">
      <div class="hero card">
        <div>
          <span class="sticker yellow">NEXT LIVE</span>
          <h1 id="nextTitle">次回予定を登録してください</h1>
          <p id="nextMeta">スケジュール画面の「追加」から登録できます。</p>
          <div class="countdown" id="countdown">LET'S GO!</div>
        </div>
        <img src="assets/character.png" alt="" class="hero-character" />
      </div>

      <div class="grid">
        <button class="menu-card cyan" data-nav="schedule"><b>📅</b><span>スケジュール</span></button>
        <button class="menu-card pink" data-nav="attendance"><b>✓</b><span>出欠確認</span></button>
        <button class="menu-card yellow" data-nav="merch"><b>👕</b><span>物販・在庫</span></button>
        <button class="menu-card cyan" data-nav="finance"><b>¥</b><span>会計・売上</span></button>
      </div>

      <section class="summary card">
        <h2>QUICK STATUS</h2>
        <div class="stats">
          <div><strong id="scheduleCount">0</strong><span>予定</span></div>
          <div><strong id="stockCount">0</strong><span>総在庫</span></div>
          <div><strong id="balanceValue">¥0</strong><span>収支</span></div>
        </div>
      </section>
    </section>

    <section class="page" data-page="schedule">
      <div class="section-head"><h1>スケジュール</h1><button class="punk-btn" id="addScheduleBtn">＋追加</button></div>
      <div id="scheduleList" class="list"></div>
    </section>

    <section class="page" data-page="attendance">
      <div class="section-head"><h1>出欠確認</h1></div>
      <label class="field">対象予定<select id="attendanceEvent"></select></label>
      <div id="attendanceList" class="list"></div>
    </section>

    <section class="page" data-page="merch">
      <div class="section-head"><h1>物販・在庫</h1><button class="punk-btn" id="addMerchBtn">＋商品</button></div>
      <div id="merchList" class="list"></div>
    </section>

    <section class="page" data-page="finance">
      <div class="section-head"><h1>会計・売上</h1><button class="punk-btn" id="addFinanceBtn">＋記録</button></div>
      <div class="finance-total card">
        <span>現在の収支</span><strong id="financeTotal">¥0</strong>
      </div>
      <div id="financeList" class="list"></div>
    </section>
  </main>

  <nav class="bottom-nav">
    <button data-nav="home" class="active">⌂<span>ホーム</span></button>
    <button data-nav="schedule">▣<span>予定</span></button>
    <button data-nav="attendance">✓<span>出欠</span></button>
    <button data-nav="merch">👕<span>物販</span></button>
    <button data-nav="finance">¥<span>会計</span></button>
  </nav>

  <dialog id="formDialog">
    <form method="dialog" id="dialogForm">
      <h2 id="dialogTitle">追加</h2>
      <div id="dialogFields"></div>
      <div class="dialog-actions">
        <button value="cancel" class="ghost-btn">キャンセル</button>
        <button value="default" id="saveDialog" class="punk-btn">保存</button>
      </div>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
