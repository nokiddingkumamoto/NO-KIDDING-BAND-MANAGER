<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#050505">
  <meta name="description" content="NO KIDDING BAND MANAGER">
  <title>NO KIDDING BAND MANAGER</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="pixel.css?v=8.4.0">
</head>
<body>
  <main class="visual-page" id="top">
    <section class="visual-top" aria-label="NO KIDDING BAND MANAGER トップ">
      <button class="hotspot menu-button" type="button" aria-label="メニューを開く" aria-expanded="false"></button>
      <div class="next-countdown next-studio-count" aria-label="次のスタジオまで" aria-live="polite">
        <strong>--</strong><span>日</span>
      </div>
      <div class="next-countdown next-live-count" aria-label="次のライブまで" aria-live="polite">
        <strong>--</strong><span>日</span>
      </div>
    </section>

    <section class="home-schedule-region" aria-labelledby="home-schedule-title">
      <h1 id="home-schedule-title" class="sr-only">確定スケジュール</h1>
      <div class="home-schedule-list" aria-live="polite"></div>
    </section>

    <section class="visual-bottom" aria-label="クイックメニュー">
      <button class="hotspot quick-card quick-schedule" type="button" data-target="schedule" aria-label="確定スケジュール"></button>
      <button class="hotspot quick-card quick-studio" type="button" data-target="studio" aria-label="スタジオ日程調整"></button>
      <button class="hotspot quick-card quick-merch" type="button" data-target="merch" aria-label="物販・在庫"></button>
    </section>
  </main>

  <div class="sheet-backdrop" hidden></div>
  <nav class="side-sheet" aria-label="メニュー" aria-hidden="true">
    <button class="sheet-close" type="button" aria-label="閉じる">×</button>
    <img src="logo.png" alt="">
    <a href="#top">ホーム</a>
    <a href="schedule.html">確定スケジュール</a>
    <a href="studio.html">スタジオ日程調整</a>
    <a href="merch.html">物販・在庫</a>
  </nav>
  <div class="toast" role="status" aria-live="polite"></div>
  <script src="app.js?v=8.4.0"></script>
</body>
</html>
