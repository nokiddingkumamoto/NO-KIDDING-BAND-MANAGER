<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#050505"><title>NO KIDDING BAND MANAGER</title>
<link rel="manifest" href="manifest.webmanifest"><link rel="stylesheet" href="styles.css?v=500">
</head>
<body>
<div id="overlay" class="overlay" hidden></div>
<aside id="drawer" class="drawer" aria-hidden="true">
  <div class="drawer-head"><img src="assets/logo.png" alt="NO KIDDING"><button id="closeMenu">×</button></div>
  <button data-page="home">⌂ ホーム</button><button data-page="schedule">▣ 確定スケジュール</button><button data-page="polls">✓ スタジオ日程調整</button><button data-page="merch">▰ 物販・在庫</button>
</aside>
<header class="hero">
  <button id="menuBtn" class="square" aria-label="メニュー"><span></span><span></span><span></span></button>
  <div class="logo-wrap"><img src="assets/logo.png" alt="NO KIDDING"><strong>バンドマネージャー</strong></div>
  <button id="quickAdd" class="square plus" aria-label="追加">＋</button>
</header>
<div class="pink-line"></div>
<main>
<section id="home" class="page active">
  <div class="section-head"><h2>スケジュール</h2><button data-page="schedule">すべて見る ›</button></div>
  <div id="homeSchedules" class="schedule-stack"></div>
  <div class="section-head quick-head"><h2>クイックメニュー</h2></div>
  <div class="quick-grid">
    <button class="quick cyan" data-page="schedule"><div class="grunge"></div><div class="calendar-icon"><i></i><b>17</b></div><strong>確定スケジュール</strong></button>
    <button class="quick pink" data-page="polls"><div class="grunge"></div><div class="check-icon">✓</div><strong>スタジオ日程調整</strong></button>
    <button class="quick yellow quick-wide" data-page="merch"><div class="grunge"></div><div class="shirt-icon">T<span>＋</span></div><strong>物販・在庫</strong></button>
  </div>
</section>
<section id="schedule" class="page"><div class="page-title"><button data-page="home">‹</button><h2>確定スケジュール</h2><button id="addSchedule">＋</button></div><div id="scheduleList"></div></section>
<section id="polls" class="page"><div class="page-title"><button data-page="home">‹</button><h2>スタジオ日程調整</h2><button id="addPoll">＋</button></div><div id="pollList" class="simple-list"></div></section>
<section id="merch" class="page"><div class="page-title"><button data-page="home">‹</button><h2>物販・在庫</h2><button id="addMerch">＋</button></div><div class="summary"><div><small>商品数</small><b id="itemCount">0</b></div><div><small>総在庫</small><b id="stockTotal">0</b></div><div><small>在庫金額</small><b id="stockValue">¥0</b></div></div><div id="merchList" class="simple-list"></div></section>

</main>

<dialog id="quickAddDialog" class="quick-add-dialog">
  <div class="quick-add-panel">
    <div class="quick-add-title"><h3>追加する項目</h3><button type="button" data-close>×</button></div>
    <button type="button" id="quickScheduleAction" class="quick-action cyan-action"><span>17</span><strong>スケジュールを追加</strong></button>
    <button type="button" id="quickProductAction" class="quick-action yellow-action"><span>Ｔ＋</span><strong>商品を追加</strong></button>
    <button type="button" id="quickStockAction" class="quick-action pink-action"><span>＋</span><strong>在庫数を変更</strong></button>
  </div>
</dialog>
<dialog id="scheduleDialog"><form id="scheduleForm"><h3 id="scheduleDialogTitle">スケジュールを追加</h3><label>分類<select id="sType"><option value="studio">スタジオ</option><option value="live">ライブ</option><option value="meeting">ミーティング</option></select></label><label>タイトル<input id="sTitle" required></label><label>日付<input id="sDate" type="date" required></label><label>時間<input id="sTime" type="text" placeholder="例：20:00 または OPEN 18:00 / START 19:00"></label><label>場所<input id="sPlace"></label><div class="actions schedule-actions"><button id="deleteSchedule" class="danger" type="button" hidden>削除</button><span></span><button type="button" data-close>キャンセル</button><button class="save">保存</button></div></form></dialog>
<dialog id="merchDialog"><form id="merchForm"><h3>商品を追加</h3><label>商品名<input id="mName" required></label><label>種類・サイズ<input id="mVariant"></label><label>在庫数<input id="mStock" type="number" min="0" required></label><label>販売価格<input id="mPrice" type="number" min="0" required></label><div class="actions"><button type="button" data-close>キャンセル</button><button class="save">保存</button></div></form></dialog>

<dialog id="stockDialog"><form id="stockForm"><h3>在庫数を変更</h3><label>商品<select id="stockItem" required></select></label><label>増減数<input id="stockChange" type="number" required placeholder="例：5 または -2"></label><div class="actions"><button type="button" data-close>キャンセル</button><button class="save">反映</button></div></form></dialog>
<script src="app.js?v=500"></script>
</body></html>
