<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>NO KIDDING BAND MANAGER キャッシュ更新</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#050505;color:#fff;font-family:Arial,"Noto Sans JP",sans-serif}
    main{text-align:center;padding:24px}strong{color:#ff0079;font-size:24px}p{line-height:1.8}
  </style>
</head>
<body>
  <main>
    <strong>UPDATE</strong>
    <p>最新版へ更新しています…</p>
  </main>
  <script>
    (async () => {
      if ("serviceWorker" in navigator) {
        const registrations = await navigator.serviceWorker.getRegistrations();
        await Promise.all(registrations.map(registration => registration.unregister()));
      }
      if ("caches" in window) {
        const keys = await caches.keys();
        await Promise.all(keys.map(key => caches.delete(key)));
      }
      location.replace("./index.html?v=734");
    })();
  </script>
</body>
</html>
